version: "3.9"

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: dashboard:latest
    container_name: dashboard_app
    restart: unless-stopped
    environment:
      - TZ=America/Bogota
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
